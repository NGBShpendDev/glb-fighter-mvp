name: Publish latest Ape Fighter build

on:
  push:
    branches: [main]
    paths: [.github/workflows/publish-latest.yml]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Materialize verified source release
        run: |
          cat release/latest-source.tar.xz.b64.part-* | base64 --decode > /tmp/latest-source.tar.xz
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          tar -xJf /tmp/latest-source.tar.xz
          cp public/models/fighter-neon.glb public/models/fighter-1.glb
          cp public/models/fighter-crimson.glb public/models/fighter-2.glb
          cp public/models/fighter-neon.glb public/models/my-ape.glb
          rm -f .github/workflows/publish-latest.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish latest Ape Fighter build"
          git push
