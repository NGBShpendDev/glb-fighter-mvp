name: Clean release metadata

on:
  push:
    branches: [main]
    paths: [.github/workflows/cleanup-macos-metadata.yml]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove archive metadata
        run: |
          find . -name '._*' -delete
          rm -f .github/workflows/cleanup-macos-metadata.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove archive metadata"
          git push
